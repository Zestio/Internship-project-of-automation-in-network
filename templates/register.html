<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">📡 Kayıt Ol</h2>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endwith %}
                        <form method="post" id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Kullanıcı Adı <small class="text-muted">(min. 3 karakter)</small></label>
                                <input type="text" name="username" id="username" class="form-control" required minlength="3">
                                <div id="username-feedback" class="form-text"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Şifre <small class="text-muted">(min. 8 karakter, büyük harf, rakam)</small></label>
                                <input type="password" name="password" id="password" class="form-control" required>
                                <div class="progress mt-2" style="height: 8px;">
                                    <div id="password-bar" class="progress-bar" style="width: 0%;"></div>
                                </div>
                                <div id="password-feedback" class="form-text mt-1"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select name="role" class="form-select">
                                    <option value="admin">Admin (Tam Yetki)</option>
                                    <option value="readonly">Readonly (Sadece Görüntüle)</option>
                                </select>
                            </div>
                            <hr>
                            <h5 class="mb-3">Router Bilgileri</h5>
                            <div class="mb-3">
                                <label class="form-label">GNS3 VM IP (Host)</label>
                                <input type="text" name="host" class="form-control" value="192.168.56.101" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telnet Port</label>
                                <input type="number" name="port" class="form-control" value="5000" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Router IP (Görüntülenecek)</label>
                                <input type="text" name="display_host" class="form-control" value="192.168.100.1" required>
                            </div>
                            <button type="submit" id="submit-btn" class="btn btn-success w-100" disabled>Kayıt Ol</button>
                        </form>
                        <hr>
                        <p class="text-center mb-0">Zaten hesabın var mı? <a href="/login">Giriş Yap</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const usernameInput = document.getElementById('username');
        const bar = document.getElementById('password-bar');
        const feedback = document.getElementById('password-feedback');
        const usernameFeedback = document.getElementById('username-feedback');
        const submitBtn = document.getElementById('submit-btn');

        function checkPassword(password) {
            let score = 0;
            let messages = [];
            if (password.length >= 8) score++; else messages.push('En az 8 karakter');
            if (/[A-Z]/.test(password)) score++; else messages.push('En az 1 büyük harf');
            if (/[0-9]/.test(password)) score++; else messages.push('En az 1 rakam');
            if (/[^A-Za-z0-9]/.test(password)) score++;
            return { score, messages };
        }

        function updateForm() {
            const password = passwordInput.value;
            const username = usernameInput.value;
            const { score, messages } = checkPassword(password);
            const percent = (score / 4) * 100;
            bar.style.width = percent + '%';
            bar.className = 'progress-bar';
            if (score <= 1) bar.classList.add('bg-danger');
            else if (score === 2) bar.classList.add('bg-warning');
            else if (score === 3) bar.classList.add('bg-info');
            else bar.classList.add('bg-success');
            feedback.innerHTML = messages.length > 0
                ? '<span class="text-danger">Eksik: ' + messages.join(', ') + '</span>'
                : '<span class="text-success">✅ Güçlü şifre</span>';
            usernameFeedback.innerHTML = (username.length > 0 && username.length < 3)
                ? '<span class="text-danger">En az 3 karakter gerekli</span>' : '';
            submitBtn.disabled = !(score >= 3 && username.length >= 3);
        }

        passwordInput.addEventListener('input', updateForm);
        usernameInput.addEventListener('input', updateForm);
    </script>
</body>
</html>
