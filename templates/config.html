<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{{ host }} - Config Yönetimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-outline-dark:hover {
            background-color: #212529;
            color: #fff;
            transition: 0.2s ease-in-out;
        }
        .btn-outline-secondary:hover {
            background-color: #6c757d;
            color: #fff;
            transition: 0.2s ease-in-out;
        }
        .btn-outline-primary:hover {
            background-color: #0d6efd;
            color: #fff;
            transition: 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/" class="btn btn-link mb-3">← Geri</a>
        <h1>Config Yönetimi: {{ host }}</h1>

        {% if request.args.get('backup') == 'success' %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            ✅ Backup başarıyla alındı.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <div class="card shadow-sm mb-4">
            <div class="card-header">Mevcut Config</div>
            <div class="card-body">
                <pre>{{ current_config }}</pre>
            </div>
        </div>

        <div class="d-flex gap-2 mb-4">
            <form action="/config/{{ host }}/backup" method="post">
                <button type="submit" class="btn btn-outline-secondary">📦 Backup Al</button>
            </form>
            <a href="/config/{{ host }}/backups" class="btn btn-outline-dark">📂 Backup Geçmişini Gör</a>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header">Yeni Config Önerisi</div>
            <div class="card-body">
                <form action="/config/{{ host }}/preview" method="post">
                    <textarea name="new_config" class="form-control mb-3" rows="8">{{ new_config or current_config }}</textarea>
                    <button type="submit" class="btn btn-primary">🔍 Önizle (Diff)</button>
                </form>
            </div>
        </div>

        {% if diff %}
        <div class="card shadow-sm">
            <div class="card-header">Diff Sonucu</div>
            <div class="card-body">
                <pre class="bg-dark text-white p-3 rounded">{{ diff }}</pre>
            </div>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
