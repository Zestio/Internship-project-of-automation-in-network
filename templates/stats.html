<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İstatistikler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/" class="btn btn-link mb-3">← Geri</a>
        <h1>📊 İstatistikler</h1>

        <!-- Özet Kartlar -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body py-3">
                        <h2 class="display-5 fw-bold text-primary">{{ total_devices }}</h2>
                        <p class="text-muted mb-0">Toplam Cihaz</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body py-3">
                        <h2 class="display-5 fw-bold text-secondary">{{ backup_count }}</h2>
                        <p class="text-muted mb-0">Toplam Backup</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body py-3">
                        <h2 class="display-5 fw-bold text-warning">{{ diff_count }}</h2>
                        <p class="text-muted mb-0">Config Diff</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body py-3">
                        <h2 class="display-5 fw-bold text-success">{{ apply_count }}</h2>
                        <p class="text-muted mb-0">Config Uygulama</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grafikler -->
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4 h-100">
                    <div class="card-header">🛡️ Compliance Skorları (%)</div>
                    <div class="card-body d-flex align-items-center justify-content-center">
                        <canvas id="complianceChart" style="max-height: 280px;"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm mb-4 h-100">
                    <div class="card-header">📋 Audit Log Dağılımı</div>
                    <div class="card-body d-flex align-items-center justify-content-center">
                        <canvas id="auditChart" style="max-height: 280px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const labels = [{% for d in compliance_data %}"{{ d.hostname }}"{% if not loop.last %},{% endif %}{% endfor %}];
        const scores = [{% for d in compliance_data %}{{ d.skor }}{% if not loop.last %},{% endif %}{% endfor %}];
        const colors = scores.map(s => s >= 80 ? '#28a745' : s >= 50 ? '#ffc107' : '#dc3545');

        new Chart(document.getElementById('complianceChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Compliance Skoru (%)',
                    data: scores,
                    backgroundColor: colors,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: { y: { min: 0, max: 100 } },
                plugins: { legend: { display: false } }
            }
        });

        new Chart(document.getElementById('auditChart'), {
            type: 'doughnut',
            data: {
                labels: ['Backup', 'Config Diff', 'Config Uygulama'],
                datasets: [{
                    data: [{{ backup_count }}, {{ diff_count }}, {{ apply_count }}],
                    backgroundColor: ['#0d6efd', '#ffc107', '#28a745'],
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 15 } }
                }
            }
        });
    </script>
</body>
</html>
