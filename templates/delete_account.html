<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hesap Sil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-danger">
                    <div class="card-body p-4">
                        <h2 class="text-center text-danger mb-4">⚠️ Hesabı Sil</h2>
                        <div class="alert alert-danger">
                            Bu işlem geri alınamaz! Tüm cihazlarınız, backuplarınız ve log kayıtlarınız silinecek.
                        </div>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endwith %}
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">Onaylamak için şifrenizi girin</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-danger w-100">Hesabımı Kalıcı Olarak Sil</button>
                            <a href="/profile" class="btn btn-outline-secondary w-100 mt-2">← Vazgeç</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
