<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şifre Değiştir</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4"> Şifre Değiştir</h2>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endwith %}
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">Mevcut Şifre</label>
                                <input type="password" name="current_password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Yeni Şifre</label>
                                <input type="password" name="new_password" id="new_password" class="form-control" required>
                                <div class="progress mt-2" style="height: 8px;">
                                    <div id="password-bar" class="progress-bar" style="width: 0%;"></div>
                                </div>
                                <div id="password-feedback" class="form-text mt-1"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Yeni Şifre (Tekrar)</label>
                                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
                                <div id="confirm-feedback" class="form-text"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Şifreyi Güncelle</button>
                            <a href="/" class="btn btn-outline-secondary w-100 mt-2">← Geri</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const newPass = document.getElementById('new_password');
        const confirmPass = document.getElementById('confirm_password');
        const bar = document.getElementById('password-bar');
        const feedback = document.getElementById('password-feedback');
        const confirmFeedback = document.getElementById('confirm-feedback');

        function checkPassword(password) {
            let score = 0;
            let messages = [];
            if (password.length >= 8) score++; else messages.push('En az 8 karakter');
            if (/[A-Z]/.test(password)) score++; else messages.push('En az 1 büyük harf');
            if (/[0-9]/.test(password)) score++; else messages.push('En az 1 rakam');
            if (/[^A-Za-z0-9]/.test(password)) score++;
            return { score, messages };
        }

        newPass.addEventListener('input', function() {
            const { score, messages } = checkPassword(this.value);
            const percent = (score / 4) * 100;
            bar.style.width = percent + '%';
            bar.className = 'progress-bar';
            if (score <= 1) bar.classList.add('bg-danger');
            else if (score === 2) bar.classList.add('bg-warning');
            else if (score === 3) bar.classList.add('bg-info');
            else bar.classList.add('bg-success');
            feedback.innerHTML = messages.length > 0
                ? '<span class="text-danger">Eksik: ' + messages.join(', ') + '</span>'
                : '<span class="text-success"> Güçlü şifre</span>';
        });

        confirmPass.addEventListener('input', function() {
            if (this.value === newPass.value) {
                confirmFeedback.innerHTML = '<span class="text-success"> Şifreler eşleşiyor</span>';
            } else {
                confirmFeedback.innerHTML = '<span class="text-danger">Şifreler eşleşmiyor</span>';
            }
        });
    </script>
</body>
</html>
