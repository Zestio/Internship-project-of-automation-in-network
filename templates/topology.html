<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ağ Topolojisi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        #topology-container {
            width: 100%;
            height: 500px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/" class="btn btn-link mb-3">← Geri</a>
        <h1> Ağ Topolojisi</h1>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div id="topology-container"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Cihaz Listesi</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Hostname</th>
                            <th>Host</th>
                            <th>Model</th>
                            <th>Durum</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d in devices %}
                        <tr>
                            <td>{{ d.hostname }}</td>
                            <td>{{ d.host }}</td>
                            <td>{{ d.model }}</td>
                            <td>
                                {% if d.hostname != "Ulaşılamıyor" %}
                                    <span class="badge bg-success">Online</span>
                                {% else %}
                                    <span class="badge bg-danger">Offline</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
      const deviceData = JSON.parse('{{ devices | tojson | safe }}');

        const nodes = new vis.DataSet(
            deviceData.map((d, i) => ({
                id: i,
                label: `${d.hostname}\n${d.host}`,
                color: d.hostname !== "Ulaşılamıyor" ? "#28a745" : "#dc3545",
                font: { color: "#fff", size: 14 },
                shape: "box",
                margin: 10,
            }))
        );

        const edges = new vis.DataSet([]);
        for (let i = 0; i < deviceData.length; i++) {
            edges.add({
                from: i,
                to: (i + 1) % deviceData.length,
                label: "Fa0/0",
                font: { align: "middle" },
                color: { color: "#6c757d" },
                width: 2,
            });
        }

        const container = document.getElementById("topology-container");
        const data = { nodes, edges };
        const options = {
            physics: {
                stabilization: true,
                barnesHut: { gravitationalConstant: -3000 }
            },
            interaction: { hover: true },
            edges: { smooth: { type: "cubicBezier" } }
        };

        new vis.Network(container, data, options);
    </script>
</body>
</html>
