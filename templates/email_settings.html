<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Email Ayarları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4"> Email Ayarları</h2>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endwith %}
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">Gönderici Email (Gmail)</label>
                                <input type="email" name="sender" class="form-control" value="{{ sender }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Gmail App Password</label>
                                <input type="password" name="password" class="form-control" placeholder="16 haneli app password" required>
                                <div class="form-text">Google Hesabım → Güvenlik → Uygulama Şifreleri</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Alıcı Email</label>
                                <input type="email" name="receiver" class="form-control" value="{{ receiver }}" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Kaydet</button>
                            <a href="/" class="btn btn-outline-secondary w-100 mt-2">← Geri</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
