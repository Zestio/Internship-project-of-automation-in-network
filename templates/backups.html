<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{{ host }} - Backup Geçmişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/config/{{ host }}" class="btn btn-link mb-3">← Geri</a>
        <h1>Backup Geçmişi: {{ host }}</h1>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Dosya Adı</th>
                            <th>Boyut (byte)</th>
                            <th>İndir</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for f in files %}
                        <tr>
                            <td>{{ f.name }}</td>
                            <td>{{ f.size }}</td>
                            <td><a href="/config/{{ host }}/backups/download/{{ f.name }}" class="btn btn-sm btn-outline-primary">⬇ İndir</a></td>
                        </tr>
                        {% else %}
                        <tr><td colspan="3" class="text-center text-muted py-4">Henüz backup alınmamış</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
