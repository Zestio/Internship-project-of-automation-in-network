<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Cihaz Ekle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4"> Yeni Cihaz Ekle</h2>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endwith %}
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">GNS3 VM IP (Host)</label>
                                <input type="text" name="host" class="form-control" placeholder="192.168.56.101" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telnet Port</label>
                                <input type="number" name="port" class="form-control" placeholder="5000" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Router IP (Görüntülenecek)</label>
                                <input type="text" name="display_host" class="form-control" placeholder="192.168.100.1" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Cihaz Ekle</button>
                            <a href="/" class="btn btn-outline-secondary w-100 mt-2">← Geri</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
