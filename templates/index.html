<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ağ Cihazları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div id="alerts-container" class="mb-3"></div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📡 Ağ Cihazları</h1>
            <div class="d-flex gap-2 align-items-center">
                <a href="/audit" class="btn btn-outline-secondary">📋 Audit Log</a>
                <a href="/topology" class="btn btn-outline-info">🗺️ Topoloji</a>
                <button class="btn btn-primary" onclick="taraButton()">🔄 Şimdi Tara</button>
                <div class="text-muted small">Son tarama: <span id="last-scan">{{ last_scan }}</span></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0" id="device-table">
                    <thead class="table-dark">
                        <tr>
                            <th>Host</th>
                            <th>Hostname</th>
                            <th>Model</th>
                            <th>Uptime</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d in devices %}
                        <tr>
                            <td>{{ d.host }}</td>
                            <td>{{ d.hostname }}</td>
                            <td><span class="badge bg-secondary">{{ d.model }}</span></td>
                            <td>{{ d.uptime }}</td>
                            <td>
                                <a href="/device/{{ d.host }}" class="btn btn-sm btn-outline-primary">Görüntüle</a>
                                <a href="/config/{{ d.host }}" class="btn btn-sm btn-outline-secondary">Config</a>
                                <a href="/compliance/{{ d.host }}" class="btn btn-sm btn-outline-success">🛡️ Compliance</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function taraButton() {
            fetch('/api/devices')
                .then(response => response.json())
                .then(result => {
                    let tbody = document.querySelector('#device-table tbody');
                    tbody.innerHTML = '';
                    result.devices.forEach(d => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${d.host}</td>
                                <td>${d.hostname}</td>
                                <td><span class="badge bg-secondary">${d.model}</span></td>
                                <td>${d.uptime}</td>
                                <td>
                                    <a href="/device/${d.host}" class="btn btn-sm btn-outline-primary">Görüntüle</a>
                                    <a href="/config/${d.host}" class="btn btn-sm btn-outline-secondary">Config</a>
                                    <a href="/compliance/${d.host}" class="btn btn-sm btn-outline-success">🛡️ Compliance</a>
                                </td>
                            </tr>`;
                    });
                    document.getElementById('last-scan').textContent = result.last_scan;
                });
        }

        function checkAlerts() {
            fetch('/api/alerts')
                .then(response => response.json())
                .then(alerts => {
                    const container = document.getElementById('alerts-container');
                    container.innerHTML = '';
                    if (alerts.length === 0) {
                        container.innerHTML = `
                            <div class="alert alert-success py-2">
                                ✅ Tüm cihazlar normal çalışıyor.
                            </div>`;
                    } else {
                        alerts.forEach(a => {
                            container.innerHTML += `
                                <div class="alert alert-${a.tip} py-2">
                                    ⚠️ ${a.mesaj}
                                </div>`;
                        });
                    }
                });
        }

        checkAlerts();
        setInterval(checkAlerts, 30000);
    </script>
</body>
</html>
