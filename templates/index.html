<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ağ Cihazları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📡 Ağ Cihazları</h1>
            <div class="text-end">
                <button class="btn btn-primary" onclick="taraButton()">🔄 Şimdi Tara</button>
                <div class="text-muted small mt-1">Son tarama: <span id="last-scan">{{ last_scan }}</span></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover align-middle mb-0" id="device-table">
                    <thead class="table-dark">
                        <tr>
                            <th>Host</th>
                            <th>Hostname</th>
                            <th>Model</th>
                            <th>Uptime</th>
                            <th>Detay</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d in devices %}
                        <tr>
                            <td>{{ d.host }}</td>
                            <td>{{ d.hostname }}</td>
                            <td><span class="badge bg-secondary">{{ d.model }}</span></td>
                            <td>{{ d.uptime }}</td>
                            <td>
                                <a href="/device/{{ d.host }}" class="btn btn-sm btn-outline-primary">Görüntüle</a>
                                <a href="/config/{{ d.host }}" class="btn btn-sm btn-outline-secondary">Config</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function taraButton() {
            fetch('/api/devices')
                .then(response => response.json())
                .then(result => {
                    let tbody = document.querySelector('#device-table tbody');
                    tbody.innerHTML = '';
                    result.devices.forEach(d => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${d.host}</td>
                                <td>${d.hostname}</td>
                                <td><span class="badge bg-secondary">${d.model}</span></td>
                                <td>${d.uptime}</td>
                                <td>
                                    <a href="/device/${d.host}" class="btn btn-sm btn-outline-primary">Görüntüle</a>
                                    <a href="/config/${d.host}" class="btn btn-sm btn-outline-secondary">Config</a>
                                </td>
                            </tr>`;
                    });
                    document.getElementById('last-scan').textContent = result.last_scan;
                });
        }
    </script>
</body>
</html>
