<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ağ Cihazları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div id="alerts-container" class="mb-3"></div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📡 Ağ Cihazları</h1>
            <div class="d-flex gap-2 align-items-center">
                <a href="/audit" class="btn btn-outline-secondary">📋 Audit Log</a>
                <a href="/topology" class="btn btn-outline-info">🗺️ Topoloji</a>
                <a href="/stats" class="btn btn-outline-dark">📊 İstatistikler</a>
                <a href="/add_device" class="btn btn-outline-success">➕ Cihaz Ekle</a>
                <button class="btn btn-primary" onclick="taraButton()">🔄 Şimdi Tara</button>
                <a href="/logout" class="btn btn-outline-danger">🚪 Çıkış ({{ username }})</a>
                <div class="text-muted small">Son tarama: <span id="last-scan">{{ last_scan }}</span></div>
            </div>
        </div>

        <!-- Toplu İşlem Butonları -->
        <div class="d-flex gap-2 mb-3" id="bulk-actions" style="display:none!important;">
            <button class="btn btn-outline-secondary" onclick="topluBackup()">📦 Seçililere Backup Al</button>
            <button class="btn btn-outline-success" onclick="topluCompliance()">🛡️ Seçililere Compliance</button>
            <button class="btn btn-outline-danger" onclick="secimTemizle()">✖ Seçimi Temizle</button>
        </div>
        <div id="bulk-result" class="mb-3"></div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0" id="device-table">
                    <thead class="table-dark">
                        <tr>
                            <th><input type="checkbox" id="select-all" onclick="hepsiniSec()"></th>
                            <th>Host</th>
                            <th>Hostname</th>
                            <th>Model</th>
                            <th>Uptime</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d in devices %}
                        <tr>
                            <td><input type="checkbox" class="device-checkbox" value="{{ d.host }}"></td>
                            <td>{{ d.host }}</td>
                            <td>{{ d.hostname }}</td>
                            <td><span class="badge bg-secondary">{{ d.model }}</span></td>
                            <td>{{ d.uptime }}</td>
                            <td>
                                <a href="/device/{{ d.host }}" class="btn btn-sm btn-outline-primary">Görüntüle</a>
                                <a href="/config/{{ d.host }}" class="btn btn-sm btn-outline-secondary">Config</a>
                                <a href="/compliance/{{ d.host }}" class="btn btn-sm btn-outline-success">🛡️ Compliance</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function guncelleBulkActions() {
            const checked = document.querySelectorAll('.device-checkbox:checked');
            const bulkDiv = document.getElementById('bulk-actions');
            bulkDiv.style.display = checked.length > 0 ? 'flex' : 'none';
        }

        function hepsiniSec() {
            const selectAll = document.getElementById('select-all');
            document.querySelectorAll('.device-checkbox').forEach(cb => {
                cb.checked = selectAll.checked;
            });
            guncelleBulkActions();
        }

        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('device-checkbox')) {
                guncelleBulkActions();
            }
        });

        function seciliHostlar() {
            return Array.from(document.querySelectorAll('.device-checkbox:checked')).map(cb => cb.value);
        }

        function secimTemizle() {
            document.querySelectorAll('.device-checkbox').forEach(cb => cb.checked = false);
            document.getElementById('select-all').checked = false;
            guncelleBulkActions();
        }

        function topluBackup() {
            const hosts = seciliHostlar();
            if (hosts.length === 0) return;
            const resultDiv = document.getElementById('bulk-result');
            resultDiv.innerHTML = '<div class="alert alert-info">⏳ Backup alınıyor...</div>';
            fetch('/api/bulk_backup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({hosts: hosts})
            })
            .then(r => r.json())
            .then(data => {
                resultDiv.innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
                secimTemizle();
            });
        }

        function topluCompliance() {
            const hosts = seciliHostlar();
            if (hosts.length === 0) return;
            const resultDiv = document.getElementById('bulk-result');
            resultDiv.innerHTML = '<div class="alert alert-info">⏳ Compliance kontrol ediliyor...</div>';
            fetch('/api/bulk_compliance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({hosts: hosts})
            })
            .then(r => r.json())
            .then(data => {
                let html = '<div class="card shadow-sm"><div class="card-header">🛡️ Toplu Compliance Sonuçları</div><div class="card-body p-0"><table class="table mb-0"><thead class="table-light"><tr><th>Host</th><th>Hostname</th><th>Skor</th></tr></thead><tbody>';
                data.results.forEach(r => {
                    const renk = r.skor >= 80 ? 'success' : r.skor >= 50 ? 'warning' : 'danger';
                    html += `<tr><td>${r.host}</td><td>${r.hostname}</td><td><span class="badge bg-${renk}">%${r.skor}</span></td></tr>`;
                });
                html += '</tbody></table></div></div>';
                resultDiv.innerHTML = html;
                secimTemizle();
            });
        }

        function taraButton() {
            fetch('/api/devices')
                .then(response => response.json())
                .then(result => {
                    let tbody = document.querySelector('#device-table tbody');
                    tbody.innerHTML = '';
                    result.devices.forEach(d => {
                        tbody.innerHTML += `
                            <tr>
                                <td><input type="checkbox" class="device-checkbox" value="${d.host}"></td>
                                <td>${d.host}</td>
                                <td>${d.hostname}</td>
                                <td><span class="badge bg-secondary">${d.model}</span></td>
                                <td>${d.uptime}</td>
                                <td>
                                    <a href="/device/${d.host}" class="btn btn-sm btn-outline-primary">Görüntüle</a>
                                    <a href="/config/${d.host}" class="btn btn-sm btn-outline-secondary">Config</a>
                                    <a href="/compliance/${d.host}" class="btn btn-sm btn-outline-success">🛡️ Compliance</a>
                                </td>
                            </tr>`;
                    });
                    document.getElementById('last-scan').textContent = result.last_scan;
                });
        }

        function checkAlerts() {
            fetch('/api/alerts')
                .then(response => response.json())
                .then(alerts => {
                    const container = document.getElementById('alerts-container');
                    container.innerHTML = '';
                    if (alerts.length === 0) {
                        container.innerHTML = `<div class="alert alert-success py-2">✅ Tüm cihazlar normal çalışıyor.</div>`;
                    } else {
                        alerts.forEach(a => {
                            container.innerHTML += `<div class="alert alert-${a.tip} py-2">⚠️ ${a.mesaj}</div>`;
                        });
                    }
                });
        }

        checkAlerts();
        setInterval(checkAlerts, 30000);
    </script>
</body>
</html>
